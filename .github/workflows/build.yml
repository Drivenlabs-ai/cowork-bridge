name: Build installer

# Compile l'installeur Windows (Inno Setup) sur un runner Windows GitHub-hébergé.
# - push sur main / workflow_dispatch : build + artefact (vérification).
# - tag v* : build + Release GitHub avec l'.exe attaché.
# Signature de code : automatique SI les secrets CODE_SIGN_PFX_BASE64 +
#   CODE_SIGN_PASSWORD sont définis. Un tag v* NON signé échoue volontairement
#   (on ne publie jamais un installeur non signé).

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# Moindre privilège par défaut ; l'écriture (Release) est accordée au seul job release.
permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $v = $env:GITHUB_REF -replace '^refs/tags/v',''
          } else {
            $v = '0.0.0'
          }
          # VersionInfoVersion (Inno) exige une version purement numérique a.b.c[.d] :
          # on en dérive une, même si le tag porte un suffixe (ex. 1.2.0-rc1 -> 1.2.0).
          $m = [regex]::Match($v, '^\d+(\.\d+){0,3}')
          $vnum = if ($m.Success) { $m.Value } else { '0.0.0' }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "vnum=$vnum" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $v (info: $vnum)"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --version=6.7.1 -y --no-progress

      - name: Compile installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "ISCC introuvable : $iscc" }
          & $iscc "/DMyAppVersion=${{ steps.ver.outputs.version }}" "/DMyAppVersionInfo=${{ steps.ver.outputs.vnum }}" "setup.iss"
          if ($LASTEXITCODE -ne 0) { throw "Échec compilation Inno Setup (code $LASTEXITCODE)" }
          Get-ChildItem Output

      # Signature de code via Azure Artifact Signing (ex-Trusted Signing) : clé en
      # HSM cloud (conforme à l'obligation hardware depuis 2023), pas de .pfx.
      # S'active dès que les 6 secrets AZURE_* sont définis dans le dépôt.
      - name: Check signing secret
        id: sign
        shell: pwsh
        run: |
          $has = -not [string]::IsNullOrEmpty($env:AZ_SECRET)
          "enabled=$($has.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          if (-not $has) { Write-Host "Secrets Azure Artifact Signing absents -> build non signé." }
        env:
          AZ_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Sign installer (Azure Artifact Signing)
        if: steps.sign.outputs.enabled == 'true'
        uses: azure/trusted-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\Output
          files-folder-filter: exe

      - name: Require signed build on release tags
        if: startsWith(github.ref, 'refs/tags/v') && steps.sign.outputs.enabled != 'true'
        shell: pwsh
        run: |
          Write-Host "::error::Tag de release mais signature Azure non configurée (secrets AZURE_* absents). On ne publie pas un installeur non signé."
          exit 1

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: CoworkBridge-Setup
          path: Output/*.exe
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # écriture limitée à ce job (création de la Release)
    steps:
      - name: Download artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: CoworkBridge-Setup
          path: dist
      - name: Create release
        shell: bash
        run: |
          exe="$(ls dist/*.exe | head -n1)"
          if [ -z "$exe" ]; then echo "Aucun .exe trouvé"; exit 1; fi
          gh release create "$GITHUB_REF_NAME" "$exe" \
            --title "Cowork Bridge $GITHUB_REF_NAME" \
            --notes "Installeur Cowork Bridge $GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
