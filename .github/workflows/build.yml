name: Build & release installer

# Compile l'installeur Inno (.exe) sur un runner Windows et publie une Release
# GitHub à CHAQUE push sur main. Version par date (YYYY.M.D.N), checksum SHA256.
# L'app installée vérifie ensuite "releases/latest" et se met à jour seule.
# (Pas de signature ici : intégrité par checksum ; signature ajoutable plus tard.)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # création de la Release

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0   # nécessaire pour compter les commits du jour

      - name: Determine version (date-based)
        id: ver
        shell: bash
        env:
          TZ: UTC   # date ET git log --since dans le même fuseau, déterministe
        run: |
          DATE=$(date +%Y-%m-%d)
          COUNT=$(git log --oneline --since="$DATE 00:00:00" | wc -l | tr -d ' ')
          if [ "$COUNT" -lt 1 ]; then COUNT=1; fi   # au moins 1 (le build courant)
          Y=$((10#$(date +%Y))); M=$((10#$(date +%m))); D=$((10#$(date +%d)))
          V="$Y.$M.$D.$COUNT"
          printf '%s' "$V" > VERSION
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Version: $V"

      - name: Bundle rclone (MIT, checksum vérifié)
        shell: pwsh
        run: |
          $ver  = '1.74.3'                       # version épinglée (auditée)
          $zip  = "rclone-v$ver-windows-amd64.zip"
          $base = "https://downloads.rclone.org/v$ver"
          Invoke-WebRequest "$base/$zip" -OutFile $zip -UseBasicParsing
          Invoke-WebRequest "$base/SHA256SUMS" -OutFile rclone-SHA256SUMS -UseBasicParsing
          $line = Select-String -Path rclone-SHA256SUMS -SimpleMatch $zip | Select-Object -First 1
          if (-not $line) { throw "Hash introuvable pour $zip dans SHA256SUMS" }
          $expected = ($line.Line -split '\s+')[0].ToLower()
          $actual   = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          if ($expected -ne $actual) { throw "Checksum rclone invalide: $actual != $expected" }
          Expand-Archive $zip -DestinationPath rclone-extract -Force
          Copy-Item (Get-ChildItem rclone-extract -Recurse -Filter rclone.exe | Select-Object -First 1).FullName -Destination rclone.exe -Force
          # Le zip rclone ne contient PAS la licence -> on récupère COPYING (MIT) depuis
          # le repo au tag exact (obligation MIT : joindre la notice). Build cassé si absente.
          Invoke-WebRequest "https://raw.githubusercontent.com/rclone/rclone/v$ver/COPYING" -OutFile rclone-LICENSE.txt -UseBasicParsing
          if (-not (Test-Path rclone-LICENSE.txt)) { throw "Notice MIT rclone introuvable" }
          Write-Host "rclone $ver bundlé (checksum OK: $actual)"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --version=6.7.1 -y --no-progress

      - name: Compile installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "ISCC introuvable : $iscc" }
          & $iscc "/DMyAppVersion=${{ steps.ver.outputs.version }}" "/DMyAppVersionInfo=${{ steps.ver.outputs.version }}" "setup.iss"
          if ($LASTEXITCODE -ne 0) { throw "Échec compilation Inno Setup (code $LASTEXITCODE)" }
          Get-ChildItem Output

      - name: Generate checksum
        shell: pwsh
        run: |
          $exe = (Get-ChildItem Output\*.exe | Select-Object -First 1).FullName
          $h = (Get-FileHash $exe -Algorithm SHA256).Hash.ToLower()
          "$h  CoworkBridge-Setup.exe" | Out-File -FilePath Output\CHECKSUM -Encoding ascii -NoNewline
          Write-Host "SHA256: $h"

      - name: Create or update release
        shell: pwsh
        run: |
          $tag = "v${{ steps.ver.outputs.version }}"
          # Idempotent : si le tag existe déjà (re-run / push sans nouveau commit),
          # on met à jour les assets au lieu d'échouer.
          gh release create $tag "Output\CoworkBridge-Setup.exe" "Output\CHECKSUM" "VERSION" `
            --title "Cowork Bridge ${{ steps.ver.outputs.version }}" `
            --notes "Build automatique depuis ${{ github.sha }}"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Le tag $tag existe déjà -> mise à jour des assets (--clobber)."
            gh release upload $tag "Output\CoworkBridge-Setup.exe" "Output\CHECKSUM" "VERSION" --clobber
            if ($LASTEXITCODE -ne 0) { throw "Échec publication de la release" }
          }
        env:
          GH_TOKEN: ${{ github.token }}
